version: v1
plugins:
  - plugin: buf.build/protocolbuffers/go:v1.36.5
    out: go
    opt:
      - paths=source_relative
  - plugin: buf.build/grpc/go:v1.5.1
    out: go
    opt:
      - paths=source_relative
managed:
  enabled: true
  go_package_prefix:
    default: github.com/KeitaShimura/logs-collector-protos/go
    except:
      - buf.build/googleapis/googleapis
