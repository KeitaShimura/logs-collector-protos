syntax = "proto3";

package logs.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/KeitaShimura/logs-collector-protos/go/logs/v1";

message Log {
  string id = 1; // UUID
  google.protobuf.Timestamp timestamp = 2; // ログ発生時刻
  string service = 3; // 送信元サービス
  string level = 4; // ログレベル (INFO, WARN, ERROR)
  string message = 5; // ログメッセージ
  map<string, string> metadata = 6; // 追加情報（IP, リクエスト ID など）
}
